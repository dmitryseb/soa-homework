services:
  postgres:
    image: postgres:16-alpine
    container_name: hw2-postgres
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 5s
      timeout: 3s
      retries: 20

  flyway:
    image: flyway/flyway:10-alpine
    container_name: hw2-flyway
    command:
      - -url=jdbc:postgresql://postgres:5432/marketplace
      - -user=marketplace
      - -password=marketplace
      - -connectRetries=60
      - migrate
    volumes:
      - ./db/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy
